<!doctype html>
<html lang="ja">
    <head>
        <!-- Basics -->
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Site information -->
        <title>TickLife</title>
        <meta name="description" content="TickLife" />

        <!-- Site panel -->
        <meta property="og:site_name" content="TickLife" />
        <meta property="og:description" content="カウントダウンします。" />
        <meta property="og:type" content="website" />

        <!-- CSS -->
        <link rel="stylesheet" href="https://unpkg.com/sanitize.css" />
        <link rel="stylesheet" href="./style.css" />

        <!-- JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/countdown@2.6.0/countdown.min.js"></script>
        <script type="module" src="js/main.js" defer></script>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=LINE+Seed+JP&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">

        <!-- Flatpickr -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

        <!-- Google Analytics -->
        <!-- Google tag (gtag.js) -->
        <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-7FPMJ0FY93"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-7FPMJ0FY93');
        </script> -->
    </head>
    <body>
        <div class="main-container">
            <header class="header">
                <a href="#" class="logo">
                    <span class="logo-text">TickLife</span>
                    <span class="logo-sub">Alpha</span>
                </a>
                <div class="dropdown" id="dropdown">
                    <button class="dropdown-button" id="dropdown-button">
                        <span class="dropdown-button-text">テストテキスト</span>
                        <svg dropdown-iconxmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-down dropdown-icon"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6 9l6 6l6 -6" /></svg>
                    </button>
                    <div class="menu-container" id="menu-container">
                        <div class="menu-controller-container">
                            <button class="menu-create-button menu-controller-button-design" id="menu-create-button">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-clock-plus"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M20.984 12.535a9 9 0 1 0 -8.468 8.45" /><path d="M16 19h6" /><path d="M19 16v6" /><path d="M12 7v5l3 3" /></svg>
                                <span class="menu-create-button-text">新規作成</span>
                            </button>
                        </div>
                    </div>
                </div>
                <button class="detail-dropdown-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-dots"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M11 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M18 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /></svg>
                </button>
            </header>
        </div>
        <div class="count-container">
            <span class="count-display">67439</span>
        </div>
        <div class="footer-kari">
            <a href="./privacy/">プライバシーポリシー</a>
        </div>
        <div class="overlay" id="overlay"></div>
        <div class="create-modal" id="create-modal">
            <div class="create-header">
                <h1>カウントダウンを作成</h1>
                <button class="create-close-button" id="create-close-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-x"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M18 6l-12 12" /><path d="M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="create-loading-content" id="create-loading-content">
                <span class="create-loading-text">Loading...</span>
                <div class="circle-spin-2 create-loading-circle"></div>
            </div>
            <div class="create-date-picker" id="create-date-picker">
                <!-- ここにJavaScriptから要素が追加される -->
            </div>
        </div>
        <div class="preview-modal" id="preview-modal">
            <h1 class="preview-msg">カウントダウンができました！</h1>
            <div class="preview-count-display">
                <div class="preview-count-center">
                    <div class="preview-count-box yrs">
                        11
                    </div>
                    <div class="preview-count-box day">
                        11
                    </div>
                    <div class="preview-count-box hrs">
                        11
                    </div>
                    <div class="preview-count-box min">
                        11
                    </div>
                    <div class="preview-count-box sec">
                        11
                    </div>
                </div>
            </div>
            
            <div class="preview-count-info">
                <p class="preview-title">名前：このサイトが完成するまで</p>
                <p class="preview-datetime">終了日時：2027年5月31日 0時0分</p>
            </div>
            <div class="preview-btns">
                <button class="cancel-btn">キャンセル</button>
                <button class="add-btn">追加</button>
            </div>
        </div>
    </body>
</html>
